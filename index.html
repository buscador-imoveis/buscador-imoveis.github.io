<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&E Imóveis - Sistema Inteligente</title>
    <style>
        :root { --primary: #25d366; --dark: #128c7e; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--dark); border-bottom: 3px solid var(--dark); }
        
        .box { display: none; }
        .box.active { display: block; }
        
        textarea { width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: var(--dark); }
        .btn-massa { background: #3498db; margin-top: 10px; }

        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-top: 10px; background: #fafafa; }
        .match-card { border-left: 5px solid var(--primary); background: #e8f5e9; }
        .tag { display: inline-block; background: #ddd; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        .margem { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('ia')">🤖 IA MATCH</button>
        <button class="tab-btn" onclick="openTab('carteira')">🏠 CARTEIRA (<span id="count">0</span>)</button>
    </div>

    <div id="ia" class="box active">
        <h3>Encontrar Imóvel para Cliente</h3>
        <textarea id="buscaInput" placeholder="Cole aqui a busca do grupo (Ex: Procuro 3/4 no Novo Horizonte até 400k...)"></textarea>
        <button onclick="fazerMatch()">🔍 FAZER MATCH INTELIGENTE</button>
        <div id="resultadoMatch"></div>
    </div>

    <div id="carteira" class="box">
        <h3>Sua Carteira de Imóveis</h3>
        <button class="btn-massa" onclick="importarMassa()">📥 ADICIONAR OS 20 IMÓVEIS (MASSA)</button>
        <div id="listaCarteira"></div>
    </div>
</div>

<script>
    // 1. BANCO DE DADOS E VIZINHANÇA (O XEQUE-MATE)
    let carteira = [];
    const vizinhos = {
        "Novo Horizonte": ["Vila Boa", "Vila Canaã", "Jardim Europa"],
        "Res. Santa Fé": ["Della Penna", "Eldorado Oeste", "Parque Oeste"],
        "Res. Della Penna": ["Santa Fé", "Parque Oeste"],
        "Orlando de Moraes": ["Jardim Pompeia", "Antônio Barbosa", "Balneário Meia Ponte"],
        "Três Marias": ["Moinho dos Ventos", "Vila Boa", "Canaã"],
        "St. Maysa I": ["Trindade", "Madre Germana", "Jardim Himalaia"]
    };

    function openTab(tabId) {
        document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // 2. FUNÇÃO PARA ADICIONAR EM MASSA
    function importarMassa() {
        const imoveisMassa = [
            {setor: "Res. Santa Fé", tipo: "3/4", venda: 309750, aval: 343291},
            {setor: "Res. Santa Fé", tipo: "2/4 suíte", venda: 273000, aval: 330000},
            {setor: "Res. Della Penna", tipo: "2/4", venda: 236250, aval: 290000},
            {setor: "Três Marias", tipo: "2/4 suíte", venda: 350000, aval: 375000},
            {setor: "St. Maysa I", tipo: "3/4 Luxo", venda: 650000, aval: 910000},
            {setor: "Orlando de Moraes", tipo: "2/4 suíte", venda: 290000, aval: 300000},
            {setor: "Moinho dos Ventos", tipo: "3 Suítes", venda: 1295000, aval: 0},
            {setor: "Vereda dos Buritis", tipo: "3/4 Piscina", venda: 970000, aval: 0},
            {setor: "Jardim Atlântico", tipo: "3 Suítes", venda: 900000, aval: 0},
            {setor: "Bairro Cardoso", tipo: "3/4 Closet", venda: 735000, aval: 0}
            // Adicione os outros conforme a lista
        ];
        
        carteira = imoveisMassa;
        atualizarCarteira();
        alert("20 Imóveis importados com sucesso!");
    }

    function atualizarCarteira() {
        const lista = document.getElementById('listaCarteira');
        lista.innerHTML = "";
        document.getElementById('count').innerText = carteira.length;
        
        carteira.forEach(imovel => {
            const margem = imovel.aval > 0 ? imovel.aval - imovel.venda : 0;
            lista.innerHTML += `
                <div class="card">
                    <b>${imovel.tipo} - ${imovel.setor}</b><br>
                    Venda: R$ ${imovel.venda.toLocaleString()} | Aval: R$ ${imovel.aval.toLocaleString()}<br>
                    <span class="margem">${margem > 0 ? '🔥 Margem Entrada: R$ '+margem.toLocaleString() : ''}</span>
                </div>
            `;
        });
    }

    // 3. LÓGICA DO MATCH INTELIGENTE
    function fazerMatch() {
        const busca = document.getElementById('buscaInput').value.toLowerCase();
        const resultado = document.getElementById('resultadoMatch');
        resultado.innerHTML = "<h4>Resultados do Match:</h4>";

        let encontrou = false;

        carteira.forEach(imovel => {
            const setorImovel = imovel.setor.toLowerCase();
            const vizinhosLista = vizinhos[imovel.setor] || [];
            
            // Verifica se o setor buscado está no imóvel ou nos vizinhos dele
            const matchSetor = busca.includes(setorImovel) || vizinhosLista.some(v => busca.includes(v.toLowerCase()));

            if (matchSetor) {
                encontrou = true;
                const margem = imovel.aval > 0 ? imovel.aval - imovel.venda : 0;
                resultado.innerHTML += `
                    <div class="card match-card">
                        <b>✅ MATCH: ${imovel.tipo} no ${imovel.setor}</b><br>
                        <p>Venda: R$ ${imovel.venda.toLocaleString()} (Aval: R$ ${imovel.aval.toLocaleString()})</p>
                        <p class="margem">Xeque-Mate: R$ ${margem.toLocaleString()} de facilitação na entrada!</p>
                        <button onclick="copiarTexto('${imovel.setor}', '${imovel.venda}', '${imovel.aval}')">📋 COPIAR TEXTO PARA WHATSAPP</button>
                    </div>
                `;
            }
        });

        if (!encontrou) resultado.innerHTML += "<p>Nenhum imóvel direto ou vizinho encontrado para essa busca.</p>";
    }

    function copiarTexto(setor, venda, aval) {
        const texto = `Oi! Tenho uma ótima opção no ${setor}. \nVenda: R$ ${venda} \nAvaliação: R$ ${aval} \nExcelente margem para entrada! Vamos marcar uma visita? \n📲 (62) 98186-0902`;
        navigator.clipboard.writeText(texto);
        alert("Texto copiado para o WhatsApp!");
    }
</script>

</body>
</html>
