<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D1B2A">
<title>M&E Imóveis — Sistema de Parcerias</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --gold-light: #E8C97A;
  --navy: #0D1B2A; --navy-mid: #162333; --navy-soft: #1E2F42;
  --text: #E8E0D0; --text-dim: #9BA8B5;
  --green: #4CAF82; --red: #E57373;
}
body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--text); margin: 0; padding: 0; }
.container { max-width: 600px; margin: 0 auto; padding: 20px; }
header { text-align: center; padding: 40px 0; }
h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 28px; margin: 0; }

.tabs { display: flex; gap: 10px; margin-bottom: 25px; background: var(--navy-mid); padding: 5px; border-radius: 12px; }
.tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 600; border-radius: 8px; transition: 0.3s; }
.tab-btn.active { background: var(--navy-soft); color: var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

.box { display: none; }
.box.active { display: block; animation: slideUp 0.4s ease-out; }

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.card-ai { background: var(--navy-mid); padding: 20px; border-radius: 16px; border: 1px solid var(--navy-border); }
textarea { width: 100%; height: 120px; background: var(--navy-soft); border: 1px solid var(--navy-border); border-radius: 12px; color: white; padding: 15px; font-size: 15px; margin-bottom: 15px; box-sizing: border-box; }
.btn-main { width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold-dim)); color: var(--navy); border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }

.imovel-card { background: var(--navy-mid); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--gold); }
.imovel-card b { color: var(--gold); display: block; margin-bottom: 5px; }
.margem-info { color: var(--green); font-size: 13px; font-weight: 700; background: rgba(76, 175, 130, 0.1); padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }

.btn-massa { background: #2A3F57; color: var(--gold-light); border: 1px dashed var(--gold); padding: 15px; width: 100%; border-radius: 12px; margin-bottom: 20px; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>M&E IMÓVEIS</h1>
        <p style="color: var(--text-dim); font-size: 14px;">Inteligência em Parcerias</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('ia')">🤖 IA Match</button>
        <button class="tab-btn" onclick="openTab('carteira')">🏠 Carteira (<span id="total-imoveis">0</span>)</button>
    </div>

    <div id="ia" class="box active">
        <div class="card-ai">
            <p style="margin-top:0; font-weight:600;">O que o corretor está buscando?</p>
            <textarea id="buscaInput" placeholder="Ex: Busco 3/4 no Novo Horizonte até 350k..."></textarea>
            <button class="btn-main" onclick="processarMatch()">🔍 FAZER MATCH INTELIGENTE</button>
        </div>
        <div id="resultados-ia" style="margin-top: 20px;"></div>
    </div>

    <div id="carteira" class="box">
        <button class="btn-massa" onclick="carregarEstoqueMassa()">📥 ADICIONAR TODOS OS 20 IMÓVEIS (MASSA)</button>
        <div id="lista-estoque"></div>
    </div>
</div>

<script>
    let estoque = [];

    // INTELIGÊNCIA GEOGRÁFICA (O XEQUE-MATE)
    const vizinhanca = {
        "novo horizonte": ["vila boa", "vila canaã", "jardim europa", "faiçalville"],
        "residencial santa fé": ["della penna", "eldorado oeste", "parque oeste", "bairro goiá"],
        "residencial della penna": ["santa fé", "parque oeste", "eldorado oeste"],
        "st. maysa i": ["trindade", "madre germana", "jardim himalaia"],
        "jardim itaipu": ["buena vista", "rio formoso", "setor cassiana"],
        "orlando de moraes": ["jardim pompeia", "antônio barbosa", "balneário"]
    };

    function openTab(id) {
        document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function carregarEstoqueMassa() {
        estoque = [
            {id: 1, titulo: "Casa 3/4 Santa Fé", setor: "Residencial Santa Fé", venda: 309750, aval: 343291},
            {id: 2, titulo: "Casa 2/4 suíte", setor: "Residencial Santa Fé", venda: 273000, aval: 330000},
            {id: 3, titulo: "Casa 2/4", setor: "Residencial Della Penna", venda: 236250, aval: 290000},
            {id: 4, titulo: "Casa 2/4", setor: "Residencial Della Penna", venda: 231000, aval: 275000},
            {id: 5, titulo: "Casa 2/4 suíte", setor: "Três Marias", venda: 350000, aval: 375000},
            {id: 6, titulo: "Eldorado Oeste 3/4", setor: "Eldorado Oeste", venda: 295000, aval: 362000},
            {id: 7, titulo: "Buena Vista 3", setor: "Buena Vista 3", venda: 270000, aval: 330000},
            {id: 8, titulo: "Jardim Itaipu suíte", setor: "Jardim Itaipu", venda: 280000, aval: 335000},
            {id: 9, titulo: "St. Maysa I Luxo", setor: "St. Maysa I", venda: 650000, aval: 910000},
            {id: 10, titulo: "Jardim Himalaia", setor: "Jardim Himalaia", venda: 390000, aval: 479000},
            {id: 11, titulo: "Orlando de Moraes", setor: "Orlando de Moraes", venda: 290000, aval: 300000},
            {id: 12, titulo: "Moinho dos Ventos 3S", setor: "Moinho dos Ventos", venda: 1295000, aval: 0},
            {id: 13, titulo: "Vereda dos Buritis", setor: "Vereda dos Buritis", venda: 970000, aval: 0},
            {id: 14, titulo: "Jardim Atlântico 3S", setor: "Jardim Atlântico", venda: 900000, aval: 0},
            {id: 15, titulo: "Bairro Cardoso", setor: "Bairro Cardoso", venda: 735000, aval: 0},
            {id: 16, titulo: "Alto do Vale", setor: "Alto do Vale", venda: 890000, aval: 0},
            {id: 17, titulo: "Vila Boa", setor: "Vila Boa", venda: 350000, aval: 380000},
            {id: 18, titulo: "Santa Fé Unid. 3", setor: "Residencial Santa Fé", venda: 264600, aval: 320000},
            {id: 19, titulo: "Santa Fé Unid. 4", setor: "Residencial Santa Fé", venda: 257250, aval: 320000},
            {id: 20, titulo: "Della Penna Unid. 2", setor: "Residencial Della Penna", venda: 233100, aval: 278000}
        ];
        renderizarEstoque();
        alert("Carteira preenchida com os 20 imóveis!");
    }

    function renderizarEstoque() {
        const div = document.getElementById('lista-estoque');
        document.getElementById('total-imoveis').innerText = estoque.length;
        div.innerHTML = estoque.map(i => {
            const margem = i.aval > i.venda ? i.aval - i.venda : 0;
            return `
                <div class="imovel-card">
                    <b>${i.titulo} - ${i.setor}</b>
                    Venda: R$ ${i.venda.toLocaleString('pt-BR')} | Aval: R$ ${i.aval.toLocaleString('pt-BR')}
                    ${margem > 0 ? `<br><span class="margem-info">🔥 Xeque-mate: R$ ${margem.toLocaleString('pt-BR')} de margem</span>` : ''}
                </div>
            `;
        }).join('');
    }

    function processarMatch() {
        const busca = document.getElementById('buscaInput').value.toLowerCase();
        const resultadosDiv = document.getElementById('resultados-ia');
        resultadosDiv.innerHTML = "";

        if (estoque.length === 0) {
            resultadosDiv.innerHTML = "<p style='color:var(--red)'>⚠ Primeiro, adicione os imóveis na aba Carteira.</p>";
            return;
        }

        const matches = estoque.filter(imovel => {
            const setorReal = imovel.setor.toLowerCase();
            let match = busca.includes(setorReal);
            
            // Lógica de Vizinhança
            for (let chave in vizinhanca) {
                if (busca.includes(chave) && vizinhanca[chave].includes(setorReal)) {
                    match = true;
                }
            }
            return match;
        });

        if (matches.length > 0) {
            matches.forEach(m => {
                const margem = m.aval > m.venda ? m.aval - m.venda : 0;
                resultadosDiv.innerHTML += `
                    <div class="imovel-card" style="border-left: 4px solid var(--green)">
                        <b style="color:var(--green)">✅ MATCH: ${m.titulo}</b>
                        📍 Setor: ${m.setor}<br>
                        💰 Venda: R$ ${m.venda.toLocaleString('pt-BR')} | Aval: R$ ${m.aval.toLocaleString('pt-BR')}
                        ${margem > 0 ? `<br><span class="margem-info">💡 Dica: Sugira pela baixa entrada (Margem R$ ${margem.toLocaleString('pt-BR')})</span>` : ''}
                        <button onclick="copiarWhatsApp('${m.setor}', '${m.venda}')" style="margin-top:10px; background:var(--navy-soft); color:var(--gold); border:1px solid var(--gold); padding:5px 10px; border-radius:6px; cursor:pointer;">📋 Copiar para WhatsApp</button>
                    </div>
                `;
            });
        } else {
            resultadosDiv.innerHTML = "<p>Nenhum imóvel direto ou vizinho encontrado. Tente buscar por região.</p>";
        }
    }

    function copiarWhatsApp(setor, valor) {
        const msg = `Olá! Tenho uma opção exclusiva no ${setor} por R$ ${valor}. Excelente avaliação bancária para facilitar a entrada do seu cliente. Vamos fechar essa parceria? 🤝`;
        navigator.clipboard.writeText(msg);
        alert("Mensagem de parceria copiada!");
    }
</script>
</body>
</html>
