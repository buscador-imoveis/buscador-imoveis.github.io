<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D1B2A">
<title>M&E Imóveis — Sistema de Parcerias</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --gold-light: #E8C97A; --gold-dim: #8B6F2E;
  --navy: #0D1B2A; --navy-mid: #162333; --navy-soft: #1E2F42; --navy-border: #2A3F57;
  --cream: #F5F0E8; --text: #E8E0D0; --text-dim: #9BA8B5;
  --green: #4CAF82; --red: #E57373;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--navy); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.6; }

header { padding: 40px 20px; text-align: center; background: linear-gradient(180deg, rgba(22,35,51,1) 0%, rgba(13,27,42,1) 100%); border-bottom: 1px solid var(--navy-border); }
.logo-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); letter-spacing: -1px; margin-bottom: 5px; }
.logo-sub { font-size: 0.9rem; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }

.main-container { max-width: 900px; margin: 0 auto; padding: 20px; }

/* Dashboard de Filtros */
.search-card { background: var(--navy-mid); border: 1px solid var(--navy-border); border-radius: 16px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }

.input-group { display: flex; flex-direction: column; gap: 8px; }
.input-group label { font-size: 0.8rem; font-weight: 600; color: var(--gold-light); }
input, select, textarea { background: var(--navy-soft); border: 1px solid var(--navy-border); color: #fff; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 1rem; transition: 0.3s; }
input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.2); }

/* Caixa de Margem Dinâmica */
#margem-box { display: none; background: rgba(76, 175, 130, 0.15); border: 1px solid var(--green); padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; animation: fadeIn 0.4s; }
#margem-valor { font-size: 1.4rem; font-weight: 700; color: #fff; display: block; }

.btn { cursor: pointer; border: none; border-radius: 8px; padding: 12px 20px; font-weight: 600; font-size: 1rem; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn-primary { background: var(--gold); color: var(--navy); width: 100%; }
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
.btn-outline { background: transparent; border: 1px solid var(--navy-border); color: var(--text); font-size: 0.85rem; }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

/* Cards de Resultados */
.res-card { background: var(--navy-mid); border: 1px solid var(--navy-border); border-radius: 12px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
.res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.res-setor { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold-light); }
.res-valor { font-weight: 700; color: #fff; font-size: 1.1rem; }
.res-info { font-size: 0.9rem; color: var(--text-dim); display: flex; gap: 15px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
.res-margem-tag { background: var(--green); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; margin-bottom: 15px; display: inline-block; }
.res-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }

@media(max-width: 600px) {
    .res-actions { grid-template-columns: 1fr 1fr; }
    .logo-title { font-size: 1.8rem; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
    <div class="logo-title">M&E IMÓVEIS</div>
    <div class="logo-sub">Parcerias Inteligentes</div>
</header>

<div class="main-container">
    <div class="search-card">
        <div class="grid-inputs">
            <div class="input-group">
                <label>📍 BUSCAR SETOR</label>
                <input type="text" id="f-setor" placeholder="Ex: Santa Fé, Maysa..." oninput="atualizar()">
            </div>
            <div class="input-group">
                <label>💰 VALOR ATÉ (R$)</label>
                <input type="number" id="f-valor" placeholder="Ex: 300000" oninput="calcularMargem(); atualizar();">
            </div>
            <div class="input-group">
                <label>📈 AVALIAÇÃO BANCÁRIA</label>
                <input type="number" id="f-avaliacao" placeholder="Ex: 340000" oninput="calcularMargem(); atualizar();">
            </div>
        </div>

        <div id="margem-box">
            <span style="font-size: 0.8rem; text-transform: uppercase; color: var(--green); font-weight: 700;">🚀 Oportunidade de Entrada Facilitada</span>
            <span id="margem-valor">R$ 0,00</span>
            <small style="color: var(--text-dim)">Margem de financiamento estimada</small>
        </div>

        <button class="btn btn-primary" onclick="window.open('https://wa.me/5562981860902', '_blank')">
            💬 Enviar Busca no WhatsApp
        </button>
    </div>

    <div id="lista-resultados">
        </div>
</div>

<script>
// Base de Dados (Atualize com seus imóveis)
const imoveis = [
    { id: 1, nome: "Casa 3/4 no Santa Fé", setor: "Residencial Santa Fé", valor: 309750, avaliacao: 343291, quartos: 3, suites: 1, area: 110, gatilhos: ["MCMV", "Avaliação Alta"] },
    { id: 2, nome: "Luxo no Maysa I", setor: "Setor Maysa I", valor: 650000, avaliacao: 910000, quartos: 3, suites: 2, area: 150, gatilhos: ["Luxo", "Entrada Facilitada"] },
    { id: 3, nome: "3 Suítes Moinho dos Ventos", setor: "Moinho dos Ventos", valor: 1295000, avaliacao: 0, quartos: 3, suites: 3, area: 200, gatilhos: ["Alto Padrão", "Aceita Permuta"] }
];

function fmtCur(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function calcularMargem() {
    const v = parseFloat(document.getElementById('f-valor').value) || 0;
    const a = parseFloat(document.getElementById('f-avaliacao').value) || 0;
    const box = document.getElementById('margem-box');
    const txt = document.getElementById('margem-valor');
    
    if (a > v && v > 0) {
        const m = a - v;
        txt.textContent = fmtCur(m);
        box.style.display = 'block';
    } else {
        box.style.display = 'none';
    }
}

function copiarParaCliente(id) {
    const im = imoveis.find(i => i.id == id);
    const m = im.avaliacao > im.valor ? im.avaliacao - im.valor : 0;
    
    const texto = `🏠 *OPORTUNIDADE: ${im.nome.toUpperCase()}*
📍 Setor: ${im.setor}
🛌 ${im.quartos} Qts | ${im.suites} Suíte(s)
📐 ${im.area}m² de área construída

💰 *Investimento: ${fmtCur(im.valor)}*
${m > 0 ? `🚀 *Diferencial:* Entrada muito facilitada (Avaliação superior)` : ''}

✨ _Interessados, falem comigo para mais detalhes e agendamento!_`;

    navigator.clipboard.writeText(texto).then(() => {
        alert("✅ Texto para cliente copiado! Agora é só colar no seu WhatsApp.");
    });
}

function atualizar() {
    const setor = document.getElementById('f-setor').value.toLowerCase();
    const lista = document.getElementById('lista-resultados');
    lista.innerHTML = '';

    const filtrados = imoveis.filter(i => i.setor.toLowerCase().includes(setor));

    filtrados.forEach(im => {
        const margem = im.avaliacao > im.valor ? im.avaliacao - im.valor : 0;
        
        lista.innerHTML += `
            <div class="res-card">
                <div class="res-header">
                    <div class="res-setor">${im.nome}</div>
                    <div class="res-valor">${fmtCur(im.valor)}</div>
                </div>
                <div class="res-info">
                    <span>🛌 ${im.quartos} Qts</span>
                    <span>📐 ${im.area}m²</span>
                    <span>📍 ${im.setor}</span>
                </div>
                ${margem > 0 ? `<div class="res-margem-tag">📈 MARGEM DE R$ ${margem.toLocaleString('pt-BR')} P/ ENTRADA</div>` : ''}
                
                <div class="res-actions">
                    <button class="btn btn-outline" onclick="copiarParaCliente(${im.id})">📋 Copiar p/ Cliente</button>
                    <button class="btn btn-outline" onclick="window.open('https://www.google.com/maps/search/${im.setor}+Goiania', '_blank')">📍 Localização</button>
                    <button class="btn btn-primary" style="padding: 8px; font-size: 0.8rem;" onclick="window.open('https://wa.me/5562981860902?text=Tenho+interesse+no+imovel+${im.nome}', '_blank')">🤝 Parceria</button>
                </div>
            </div>
        `;
    });
}

// Iniciar lista
atualizar();
</script>
</body>
</html>
